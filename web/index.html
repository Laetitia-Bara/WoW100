<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WoW100% - companion de collection World of Warcraft.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WoW100%">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WoW100%</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var isAndroid = /Android/i.test(navigator.userAgent);
      var isCallback = window.location.pathname === '/callback';
      var query = window.location.search || '';
      var hasOAuthResult = /[?&](code|error)=/.test(query);

      if (!isAndroid || !isCallback || !hasOAuthResult) {
        return;
      }

      var fallback = encodeURIComponent(window.location.href);
      window.location.replace(
        'intent://callback' +
        query +
        '#Intent;scheme=wow100;package=fr.cosmoslty.wow100;' +
        'S.browser_fallback_url=' +
        fallback +
        ';end'
      );
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
