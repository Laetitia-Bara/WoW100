<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WoW100% - companion de collection World of Warcraft.">
  <meta name="theme-color" content="#150713">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WoW100%">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WoW100%</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var isAndroid = /Android/i.test(navigator.userAgent);
      var isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
      var isCallback = window.location.pathname === '/callback';
      var query = window.location.search || '';
      var hasOAuthResult = /[?&](code|error)=/.test(query);

      if (!isCallback || !hasOAuthResult) {
        return;
      }

      if (isAndroid) {
        var fallback = encodeURIComponent(window.location.href);
        window.location.replace(
          'intent://callback' +
          query +
          '#Intent;scheme=wow100;package=fr.cosmoslty.wow100;' +
          'S.browser_fallback_url=' +
          fallback +
          ';end'
        );
        return;
      }

      if (isIOS) {
        window.wow100NativeCallbackUrl = 'wow100://callback' + query;
      }
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div
    id="oauth-callback-fallback"
    style="
      display: none;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      background: #150713;
      color: #fff7e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
    "
  >
    <div style="max-width: 360px;">
      <h1 style="margin: 0 0 12px; font-size: 24px;">Retour vers WoW100%</h1>
      <p style="margin: 0 0 20px; color: #d8c7b8; line-height: 1.45;">
        La connexion Battle.net est terminee. Si l'app ne se rouvre pas automatiquement, touche le bouton ci-dessous.
      </p>
      <button
        id="oauth-callback-button"
        type="button"
        style="
          border: 0;
          border-radius: 8px;
          padding: 13px 18px;
          background: #d6a646;
          color: #1c0d08;
          font: inherit;
          font-weight: 700;
        "
      >
        Ouvrir WoW100%
      </button>
    </div>
  </div>
  <script>
    (function () {
      var nativeCallbackUrl = window.wow100NativeCallbackUrl;

      if (!nativeCallbackUrl) {
        var flutterBootstrap = document.createElement('script');
        flutterBootstrap.src = 'flutter_bootstrap.js';
        flutterBootstrap.async = true;
        document.body.appendChild(flutterBootstrap);
        return;
      }

      var fallback = document.getElementById('oauth-callback-fallback');
      var button = document.getElementById('oauth-callback-button');

      fallback.style.display = 'grid';
      button.addEventListener('click', function () {
        window.location.href = nativeCallbackUrl;
      });

      window.setTimeout(function () {
        window.location.href = nativeCallbackUrl;
      }, 250);
    })();
  </script>
</body>
</html>
